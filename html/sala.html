<!DOCTYPE html>

</head>
<body>

    <div class="bg-effects">

        <div class="bg-orb bg-orb-2"></div>
    </div>

    <!-- Navigacija -->
    <nav class="navbar">
        <a href="filmovi.html" class="nav-brand">
            <span class="brand-icon">&#9655;</span> CineMax
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="filmovi.html">Filmovi</a></li>
            <li><a href="raspored.html">Raspored</a></li>
            <li><a href="sala.html" class="active">Sala</a></li>
        </ul>
    </nav>

    <main class="content">

        <!-- Breadcrumb -->
        <div class="breadcrumb">
            <a href="filmovi.html">Filmovi</a>
            <span class="bc-sep">&#8250;</span>
            <a href="raspored.html">Raspored</a>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-current">Odabir sjedišta</span>
        </div>

        <!-- Sala - dinamicki generisano JavaScript-om -->
        <div id="sala"></div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-brand"><span class="brand-icon">&#9655;</span> CineMax</div>
            <p>&copy; 2026 CineMax Kino. Sva prava zadržana.</p>
        </div>
    </footer>

    <!-- Confirmation Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-confetti">
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
                <div class="confetti-piece"></div>
            </div>
            <div class="modal-icon">&#9989;</div>
            <h2 class="modal-title">Rezervacija potvrđena!</h2>
            <p class="modal-subtitle">Vaše ulaznice su uspješno rezervisane</p>
            <div class="modal-divider"></div>
            <div class="modal-details">
                <div class="modal-row">
                    <span class="modal-label">&#127916; Film</span>
                    <span class="modal-value" id="modalFilm"></span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">&#128336; Vrijeme</span>
                    <span class="modal-value" id="modalTime"></span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">&#128186; Sjedišta</span>
                    <span class="modal-value" id="modalSeats"></span>
                </div>
                <div class="modal-row">
                    <span class="modal-label">&#127903; Ukupno</span>
                    <span class="modal-value" id="modalTotal"></span>
                </div>
            </div>
            <p class="modal-thanks">&#127871; Hvala vam! Uživajte u filmu!</p>
            <button class="modal-btn" id="modalClose">Zatvori</button>
        </div>
